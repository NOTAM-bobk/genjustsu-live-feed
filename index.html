<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>GENJUTSU // DEV TERMINAL</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@700;800&family=Noto+Sans+JP:wght@700;900&display=swap" rel="stylesheet" />
  <style>
    :root {
      --ink: #1a1a1a;
      --bg: #f0f0f0;
      --white: #ffffff;
      --accent: #3366ff;
      --success: #00e676;
      --warning: #ffcc00;
      --border: 2px solid var(--ink);
      --shadow: 4px 4px 0px var(--ink);
      --mono: 'Space Mono', monospace;
      --sans: 'Syne', sans-serif;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }
    
    html, body { width: 100%; overflow-x: hidden; }

    body {
      background-color: var(--bg);
      color: var(--ink);
      font-family: var(--sans);
      line-height: 1.5;
      padding-top: 80px;
      background-image: radial-gradient(var(--ink) 0.5px, transparent 0.5px);
      background-size: 20px 20px;
    }

    /* ── HEADER ── */
    header {
      position: fixed; top: 0; left: 0; right: 0; height: 80px;
      background: var(--white); border-bottom: var(--border);
      display: flex; align-items: center; justify-content: space-between;
      padding: 0 1rem; z-index: 1000;
    }
    .brand { display: flex; align-items: center; gap: 8px; font-weight: 800; text-transform: uppercase; font-size: 1rem; flex-shrink: 0; }
    
    .search-container {
      flex: 1;
      max-width: 400px;
      margin: 0 1rem;
      position: relative;
    }
    .search-input {
      width: 100%;
      padding: 10px 15px 10px 40px;
      border: var(--border);
      font-family: var(--mono);
      font-size: 0.8rem;
      outline: none;
      background: var(--white);
    }
    .search-icon { position: absolute; left: 12px; top: 50%; transform: translateY(-50%); opacity: 0.5; }

    .nav-actions { display: flex; gap: 0.5rem; align-items: center; }

    /* ── MAIN LAYOUT ── */
    .app-grid {
      max-width: 1100px; 
      margin: 1rem auto;
      display: grid; 
      grid-template-columns: 280px 1fr; 
      gap: 1.5rem;
      padding: 0 1rem;
      width: 100%;
    }

    /* ── SIDEBAR ── */
    .sidebar { position: sticky; top: 95px; height: fit-content; }
    .card { background: var(--white); border: var(--border); box-shadow: var(--shadow); padding: 1.25rem; margin-bottom: 1.5rem; }
    .sidebar-title { font-size: 0.75rem; text-transform: uppercase; letter-spacing: 0.1em; margin-bottom: 1rem; color: #666; display: flex; align-items: center; gap: 8px; }
    
    .filter-group { display: flex; flex-direction: column; gap: 0.4rem; }
    .filter-item {
      display: flex; align-items: center; gap: 10px;
      padding: 8px 12px; border: 2px solid transparent;
      cursor: pointer; font-family: var(--mono); font-size: 0.85rem;
      transition: all 0.2s;
    }
    .filter-item:hover { background: #f9f9f9; border-color: var(--ink); }
    .filter-item.active { background: var(--warning); border-color: var(--ink); }

    .stat-row { display: flex; justify-content: space-between; font-family: var(--mono); font-size: 0.75rem; margin-bottom: 0.5rem; }
    .stat-val { font-weight: 700; color: var(--accent); }
    
    .user-stats-list { margin-top: 1rem; border-top: 1px dashed #ccc; padding-top: 1rem; }
    .user-stat-pill { display: flex; justify-content: space-between; font-size: 0.7rem; font-family: var(--mono); margin-bottom: 4px; padding: 2px 4px; background: #f8f8f8; }

    /* ── POSTS ── */
    #feed-container { min-width: 0; }

    .post { 
      background: var(--white); 
      border: var(--border); 
      box-shadow: var(--shadow); 
      padding: 1.5rem; 
      margin-bottom: 1.5rem; 
      position: relative;
      width: 100%;
    }

    .post-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 1rem; gap: 10px; }
    .user-meta { display: flex; gap: 12px; align-items: center; min-width: 0; }
    
    .avatar { 
      width: 44px; height: 44px; border: var(--border); 
      background: #ddd; flex-shrink: 0; overflow: hidden;
    }
    .avatar img { width: 100%; height: 100%; object-fit: cover; }
    
    .user-info { min-width: 0; }
    .user-name { font-weight: 800; text-transform: uppercase; font-size: 0.95rem; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .user-handle { font-family: var(--mono); font-size: 0.7rem; opacity: 0.6; }

    .post-content { font-size: 1rem; margin-bottom: 1.25rem; white-space: pre-wrap; overflow-wrap: break-word; }

    /* ── CODE BLOCKS ── */
    .code-container {
      background: #1a1a1a; border: var(--border); margin: 1rem 0;
      position: relative; transition: all 0.3s ease;
      display: flex; flex-direction: column;
    }
    .code-container.collapsed { max-height: 250px; overflow: hidden; }
    .code-container.collapsed .code-body-wrapper { max-height: 160px; overflow: hidden; position: relative; }
    .code-container.collapsed .code-body-wrapper::after {
      content: ""; position: absolute; bottom: 0; left: 0; right: 0; height: 50px;
      background: linear-gradient(transparent, #1a1a1a); pointer-events: none;
    }
    .code-header { 
      background: #333; padding: 6px 12px; display: flex; justify-content: space-between; 
      align-items: center; border-bottom: 1px solid #444;
    }
    .code-lang { color: #aaa; font-family: var(--mono); font-size: 0.65rem; text-transform: uppercase; }
    
    .code-body { 
      padding: 1rem; color: var(--success); font-family: var(--mono); 
      font-size: 0.8rem; overflow-x: auto; tab-size: 2; margin: 0;
    }
    
    .code-actions { display: flex; flex-wrap: wrap; gap: 8px; padding: 8px; background: #222; border-top: 1px solid #333; }
    
    .btn-sm { 
      padding: 4px 10px; font-family: var(--mono); font-size: 0.65rem; 
      cursor: pointer; border: 1px solid #555; background: #333; color: white;
      display: flex; align-items: center; gap: 5px; text-decoration: none;
    }
    .btn-sm:hover { background: #444; border-color: #999; }
    .btn-sm.black-text { color: var(--ink); background: var(--white); border-color: var(--ink); }
    .btn-sm.black-text:hover { background: #eee; }

    /* ── MEDIA ── */
    .media-container {
      margin: 1rem 0; border: var(--border); position: relative; overflow: hidden;
      max-height: 300px; transition: max-height 0.4s ease;
      background: #eee;
    }
    .media-container.expanded { max-height: none; }
    .media-container img { width: 100%; display: block; height: auto; }
    
    .media-overlay {
      position: absolute; bottom: 0; left: 0; right: 0; height: 80px;
      background: linear-gradient(transparent, rgba(0,0,0,0.7));
      display: flex; align-items: flex-end; justify-content: center; padding-bottom: 15px;
      cursor: pointer;
    }
    .media-container.expanded .media-overlay { display: none; }

    /* ── LIVE PREVIEW ── */
    .preview-box {
      margin: 1rem 0; border: var(--border); background: white; height: 350px; width: 100%;
      display: none; flex-direction: column;
    }
    .preview-box.active { display: flex; }
    .preview-toolbar { background: #f0f0f0; border-bottom: 1px solid #ddd; padding: 5px 10px; display: flex; justify-content: flex-end; }
    .preview-iframe { flex: 1; width: 100%; border: none; }

    .post-footer { 
      display: flex; justify-content: space-between; align-items: center; 
      border-top: 1px solid #eee; margin-top: 1rem; padding-top: 1rem;
    }
    .post-stats { display: flex; gap: 1rem; font-family: var(--mono); font-size: 0.75rem; }
    .stat { display: flex; align-items: center; gap: 4px; }

    .btn {
      display: inline-flex; align-items: center; gap: 8px;
      padding: 8px 16px; background: var(--white); border: var(--border);
      box-shadow: 2px 2px 0px var(--ink); cursor: pointer;
      font-family: var(--mono); font-weight: 700; text-transform: uppercase;
      transition: all 0.1s; font-size: 0.85rem;
    }
    .btn:hover { transform: translate(-2px, -2px); box-shadow: 4px 4px 0px var(--ink); }

    /* ── MOBILE OPTIMIZATIONS ── */
    @media (max-width: 800px) {
      body { padding-top: 130px; }
      header { height: auto; flex-direction: column; padding: 10px; gap: 10px; }
      .brand { align-self: flex-start; }
      .search-container { margin: 0; width: 100%; max-width: none; }
      .nav-actions { width: 100%; justify-content: space-between; }
      .app-grid { grid-template-columns: 1fr; margin-top: 0; }
      .sidebar { position: static; order: -1; }
      .post { padding: 1rem; }
    }

    .icon { width: 1.2em; height: 1.2em; stroke: currentColor; stroke-width: 2; fill: none; stroke-linecap: round; stroke-linejoin: round; flex-shrink: 0; }
  </style>
</head>
<body>

<header>
  <div class="brand">
    <svg class="icon" viewBox="0 0 24 24"><path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"/></svg>
    Terminal
  </div>

  <div class="search-container">
    <svg class="icon search-icon" viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
    <input type="text" class="search-input" placeholder="Search dev records..." id="post-search">
  </div>

  <div class="nav-actions">
    <div id="mobile-stats-trigger" style="display:none;"></div>
    <button class="btn" id="refresh-btn">
      <svg class="icon" viewBox="0 0 24 24"><path d="M23 4v6h-6M1 20v-6h6M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"/></svg>
      Sync
    </button>
  </div>
</header>

<main class="app-grid">
  <aside class="sidebar">
    <div class="card">
      <div class="sidebar-title">
        <svg class="icon" viewBox="0 0 24 24"><polygon points="22 3 2 3 10 12.46 10 19 14 21 14 12.46 22 3"/></svg>
        Filter Stream
      </div>
      <div class="filter-group">
        <div class="filter-item active" data-type="all">
          <svg class="icon" viewBox="0 0 24 24"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"/><line x1="3" y1="9" x2="21" y2="9"/><line x1="9" y1="21" x2="9" y2="9"/></svg>
          Everything
        </div>
        <div class="filter-item" data-type="code">
          <svg class="icon" viewBox="0 0 24 24"><polyline points="16 18 22 12 16 6"/><polyline points="8 6 2 12 8 18"/></svg>
          Code Only
        </div>
        <div class="filter-item" data-type="media">
          <svg class="icon" viewBox="0 0 24 24"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>
          Visuals
        </div>
      </div>
    </div>

    <div class="card">
      <div class="sidebar-title">
        <svg class="icon" viewBox="0 0 24 24"><path d="M12 2v20M2 12h20M4.93 4.93l14.14 14.14M4.93 19.07L19.07 4.93"/></svg>
        Global Analytics
      </div>
      <div class="stat-row"><span>Daily Posts</span> <span class="stat-val" id="stat-posts">0</span></div>
      <div class="stat-row"><span>Source Lines</span> <span class="stat-val" id="stat-lines">0</span></div>
      <div class="stat-row"><span>Engagement</span> <span class="stat-val" id="stat-likes">0</span></div>
      
      <div class="user-stats-list" id="user-stats-container">
        <!-- User based stats will be injected here -->
      </div>

      <button class="btn" style="width: 100%; margin-top: 15px; font-size: 0.7rem;" id="refresh-stats-btn">
        <svg class="icon" viewBox="0 0 24 24"><path d="M21 12a9 9 0 1 1-9-9c2.52 0 4.85.83 6.72 2.25L21 8M21 3v5h-5"/></svg>
        Update Analytics
      </button>
    </div>
  </aside>

  <section id="feed-container">
    <div id="feed"></div>
  </section>
</main>

<script>
  const API = 'https://genjutsu-social.vercel.app/api/genjutsu-feed';
  const SOURCE = 'https://genjutsu-social.vercel.app';
  let allPosts = [];
  let currentFilter = 'all';
  let searchQuery = '';

  const ICONS = {
    heart: `<svg class="icon" viewBox="0 0 24 24"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg>`,
    comment: `<svg class="icon" viewBox="0 0 24 24"><path d="M21 11.5a8.38 8.38 0 0 1-.9 3.8 8.5 8.5 0 0 1-7.6 4.7 8.38 8.38 0 0 1-3.8-.9L3 21l1.9-5.7a8.38 8.38 0 0 1-.9-3.8 8.5 8.5 0 0 1 4.7-7.6 8.38 8.38 0 0 1 3.8-.9h.5a8.48 8.48 0 0 1 8 8v.5z"/></svg>`,
    eye: `<svg class="icon" viewBox="0 0 24 24"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>`,
    external: `<svg class="icon" viewBox="0 0 24 24"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></svg>`,
    play: `<svg class="icon" viewBox="0 0 24 24"><polygon points="5 3 19 12 5 21 5 3"/></svg>`,
    chevronDown: `<svg class="icon" viewBox="0 0 24 24"><polyline points="6 9 12 15 18 9"/></svg>`,
    chevronUp: `<svg class="icon" viewBox="0 0 24 24"><polyline points="18 15 12 9 6 15"/></svg>`,
    maximize: `<svg class="icon" viewBox="0 0 24 24"><path d="M15 3h6v6M9 21H3v-6M21 3l-7 7M3 21l7-7"/></svg>`,
    user: `<svg class="icon" viewBox="0 0 24 24"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>`
  };

  function escapeHtml(unsafe) {
    if (!unsafe) return '';
    return unsafe
         .replace(/&/g, "&amp;")
         .replace(/</g, "&lt;")
         .replace(/>/g, "&gt;")
         .replace(/"/g, "&quot;")
         .replace(/'/g, "&#039;");
  }

  async function fetchFeed() {
    try {
      const res = await fetch(API, { cache: 'no-store' });
      const data = await res.json();
      if (data.ok) {
        allPosts = data.posts;
        calculateStats();
        render();
      }
    } catch (e) { console.error("Fetch error", e); }
  }

  function calculateStats() {
    const today = new Date().toDateString();
    const todayPosts = allPosts.filter(p => new Date(p.created_at).toDateString() === today);
    document.getElementById('stat-posts').innerText = todayPosts.length;
    
    let totalLines = 0;
    let totalLikes = 0;
    const userMap = {};

    allPosts.forEach(p => {
      // General stats
      if (p.code) totalLines += p.code.split('\n').length;
      totalLikes += (p.likes_count || 0);

      // User specific stats
      const handle = p.profile?.username || 'ghost';
      if (!userMap[handle]) {
        userMap[handle] = { count: 0, likes: 0 };
      }
      userMap[handle].count++;
      userMap[handle].likes += (p.likes_count || 0);
    });

    document.getElementById('stat-lines').innerText = totalLines;
    document.getElementById('stat-likes').innerText = totalLikes;

    // Render User Stats
    const topUsers = Object.entries(userMap)
      .sort((a, b) => b[1].count - a[1].count)
      .slice(0, 5);

    const userStatsHtml = `
      <div style="font-size: 0.6rem; color: #888; margin-bottom: 8px; text-transform: uppercase;">Top Contributors</div>
      ${topUsers.map(([handle, data]) => `
        <div class="user-stat-pill">
          <span>@${handle}</span>
          <span style="color:var(--accent)">${data.count} posts</span>
        </div>
      `).join('')}
    `;
    document.getElementById('user-stats-container').innerHTML = userStatsHtml;
  }

  window.toggleCode = function(btn) {
    const container = btn.closest('.code-container');
    const isCollapsed = container.classList.toggle('collapsed');
    btn.innerHTML = isCollapsed ? `${ICONS.chevronDown} View All` : `${ICONS.chevronUp} Collapse`;
  };

  window.toggleImage = function(overlay) {
    const container = overlay.closest('.media-container');
    container.classList.add('expanded');
  };

  window.runCode = function(btn, code, lang) {
    const post = btn.closest('.post');
    let previewBox = post.querySelector('.preview-box');
    const decodedCode = atob(code);
    
    if (!previewBox) {
      previewBox = document.createElement('div');
      previewBox.className = 'preview-box';
      previewBox.innerHTML = `
        <div class="preview-toolbar">
          <button class="btn-sm" style="background:transparent; color:#333; border-color:#ccc;" onclick="openInNewWindow(this.dataset.code, '${lang}')" data-code="${code}">
            ${ICONS.maximize} Pop-out
          </button>
        </div>
        <iframe class="preview-iframe"></iframe>
      `;
      post.querySelector('.code-container').after(previewBox);
    }

    const isActive = previewBox.classList.toggle('active');
    btn.innerHTML = isActive ? `✕ Stop Preview` : `${ICONS.play} Live Preview`;

    if (isActive) {
      const iframe = previewBox.querySelector('iframe');
      let doc = iframe.contentWindow.document;
      doc.open();
      if (lang === 'html' || !lang) {
        doc.write(decodedCode);
      } else if (lang === 'javascript' || lang === 'js') {
        doc.write(`<html><body style="font-family:sans-serif;padding:20px;"><h3>Terminal JS</h3><pre id="output" style="background:#111;color:#0f0;padding:15px;border-radius:4px;"></pre><script>
          const console = { log: (msg) => { document.getElementById('output').textContent += (typeof msg === 'object' ? JSON.stringify(msg) : msg) + '\\n'; } };
          try { ${decodedCode} } catch(e) { console.log("Error: " + e.message); }
        <\/script></body></html>`);
      } else if (lang === 'css') {
        doc.write(`<html><head><style>${decodedCode}</style></head><body><div style="padding:40px;text-align:center;"><h3>Style Sheet Loaded</h3><div class="test-element">Styling Preview</div></div></body></html>`);
      }
      doc.close();
    }
  };

  window.openInNewWindow = function(b64Code, lang) {
    const code = atob(b64Code);
    const win = window.open("", "_blank");
    if (lang === 'html' || !lang) {
      win.document.write(code);
    } else {
      win.document.write(`<html><head><title>Terminal Code Preview</title></head><body style="margin:0;padding:20px;font-family:monospace;white-space:pre-wrap;">${escapeHtml(code)}</body></html>`);
    }
    win.document.close();
  };

  function render() {
    const container = document.getElementById('feed');
    const filtered = allPosts.filter(p => {
      let passType = currentFilter === 'all' || (currentFilter === 'code' && p.code) || (currentFilter === 'media' && p.media_url);
      const search = searchQuery.toLowerCase();
      const match = (p.content || '').toLowerCase().includes(search) || (p.code || '').toLowerCase().includes(search) || (p.profile?.username || '').toLowerCase().includes(search);
      return passType && match;
    });

    if (filtered.length === 0) {
      container.innerHTML = `<div class="post" style="text-align:center; opacity:0.6; font-family:var(--mono); padding: 3rem;">[ 404_NO_RECORDS_FOUND ]</div>`;
      return;
    }

    container.innerHTML = filtered.map(p => {
      const name = p.profile?.display_name || p.profile?.username || 'ANON';
      const handle = p.profile?.username || 'ghost';
      const avatarUrl = p.profile?.avatar_url || `https://api.dicebear.com/7.x/identicon/svg?seed=${handle}`;
      
      let codeHtml = '';
      if (p.code) {
        const b64Code = btoa(unescape(encodeURIComponent(p.code)));
        const isPreviewable = ['html', 'css', 'javascript', 'js'].includes(p.code_language?.toLowerCase());
        codeHtml = `
          <div class="code-container collapsed">
            <div class="code-header">
              <div class="code-lang">${p.code_language || 'txt'}</div>
            </div>
            <div class="code-body-wrapper">
              <pre class="code-body"><code>${escapeHtml(p.code)}</code></pre>
            </div>
            <div class="code-actions">
              <button class="btn-sm" onclick="toggleCode(this)">${ICONS.chevronDown} View All</button>
              ${isPreviewable ? `<button class="btn-sm" onclick="runCode(this, '${b64Code}', '${p.code_language}')">${ICONS.play} Live Preview</button>` : ''}
            </div>
          </div>
        `;
      }

      const mediaHtml = p.media_url ? `
        <div class="media-container">
          <img src="${p.media_url}" alt="Attachment" loading="lazy">
          <div class="media-overlay" onclick="toggleImage(this)">
            <div class="btn-sm" style="background:var(--ink);border-color:var(--white);">${ICONS.maximize} View Full Size</div>
          </div>
        </div>` : '';

      return `
        <article class="post">
          <div class="post-header">
            <div class="user-meta">
              <div class="avatar"><img src="${avatarUrl}" onerror="this.src='https://api.dicebear.com/7.x/identicon/svg?seed=${handle}'"></div>
              <div class="user-info">
                <div class="user-name">${name}</div>
                <div class="user-handle">@${handle}</div>
              </div>
            </div>
            <div style="font-family: var(--mono); font-size: 0.65rem; opacity: 0.5;">
              ${new Date(p.created_at).toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'})}
            </div>
          </div>

          <div class="post-content">${p.content || ''}</div>
          ${codeHtml}
          ${mediaHtml}

          <div class="post-footer">
            <div class="post-stats">
              <span class="stat">${ICONS.heart} ${p.likes_count || 0}</span>
              <span class="stat">${ICONS.comment} ${p.comments_count || 0}</span>
            </div>
            <a href="${SOURCE}/post/${p.id}" target="_blank" class="btn-sm black-text">
              ${ICONS.external} View Source
            </a>
          </div>
        </article>
      `;
    }).join('');
  }

  document.getElementById('post-search').addEventListener('input', (e) => {
    searchQuery = e.target.value;
    render();
  });

  document.querySelectorAll('.filter-item').forEach(item => {
    item.addEventListener('click', () => {
      document.querySelectorAll('.filter-item').forEach(i => i.classList.remove('active'));
      item.classList.add('active');
      currentFilter = item.dataset.type;
      render();
    });
  });

  document.getElementById('refresh-btn').onclick = fetchFeed;
  document.getElementById('refresh-stats-btn').onclick = fetchFeed;

  fetchFeed();
  setInterval(fetchFeed, 60000);
</script>

</body>
</html>
