<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>GENJUTSU // DEV TERMINAL</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@700;800&family=Noto+Sans+JP:wght@700;900&display=swap" rel="stylesheet" />
  <style>
    :root {
      --ink: #1a1a1a;
      --bg: #f0f0f0;
      --white: #ffffff;
      --accent: #3366ff;
      --success: #00e676;
      --warning: #ffcc00;
      --border: 2px solid var(--ink);
      --shadow: 4px 4px 0px var(--ink);
      --mono: 'Space Mono', monospace;
      --sans: 'Syne', sans-serif;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }
    
    html, body { width: 100%; overflow-x: hidden; }

    body {
      background-color: var(--bg);
      color: var(--ink);
      font-family: var(--sans);
      line-height: 1.5;
      padding-top: 80px;
      background-image: radial-gradient(var(--ink) 0.5px, transparent 0.5px);
      background-size: 20px 20px;
    }

    /* ── HEADER ── */
    header {
      position: fixed; top: 0; left: 0; right: 0; height: 80px;
      background: var(--white); border-bottom: var(--border);
      display: flex; align-items: center; justify-content: space-between;
      padding: 0 1.5rem; z-index: 1000;
    }
    .brand { display: flex; align-items: center; gap: 10px; font-weight: 800; text-transform: uppercase; font-size: 1.1rem; }
    
    .search-container {
      flex: 1;
      max-width: 400px;
      margin: 0 2rem;
      position: relative;
    }
    .search-input {
      width: 100%;
      padding: 10px 15px 10px 40px;
      border: var(--border);
      font-family: var(--mono);
      font-size: 0.8rem;
      outline: none;
    }
    .search-icon { position: absolute; left: 12px; top: 50%; transform: translateY(-50%); opacity: 0.5; }

    .nav-actions { display: flex; gap: 0.8rem; align-items: center; }

    /* ── MAIN LAYOUT ── */
    .app-grid {
      max-width: 1100px; 
      margin: 1.5rem auto;
      display: grid; 
      grid-template-columns: 260px 1fr; 
      gap: 1.5rem;
      padding: 0 1rem;
      width: 100%;
    }

    /* ── SIDEBAR ── */
    .sidebar { position: sticky; top: 95px; height: fit-content; }
    .card { background: var(--white); border: var(--border); box-shadow: var(--shadow); padding: 1.25rem; margin-bottom: 1.5rem; }
    .sidebar-title { font-size: 0.75rem; text-transform: uppercase; letter-spacing: 0.1em; margin-bottom: 1rem; color: #666; display: flex; align-items: center; gap: 8px; }
    
    .filter-group { display: flex; flex-direction: column; gap: 0.4rem; }
    .filter-item {
      display: flex; align-items: center; gap: 10px;
      padding: 8px 12px; border: 2px solid transparent;
      cursor: pointer; font-family: var(--mono); font-size: 0.85rem;
      transition: all 0.2s;
    }
    .filter-item:hover { background: #f9f9f9; border-color: var(--ink); }
    .filter-item.active { background: var(--warning); border-color: var(--ink); }

    .stat-row { display: flex; justify-content: space-between; font-family: var(--mono); font-size: 0.75rem; margin-bottom: 0.5rem; }
    .stat-val { font-weight: 700; color: var(--accent); }

    /* ── POSTS ── */
    #feed-container { min-width: 0; }

    .post { 
      background: var(--white); 
      border: var(--border); 
      box-shadow: var(--shadow); 
      padding: 1.5rem; 
      margin-bottom: 1.5rem; 
      position: relative;
      width: 100%;
    }

    .post-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 1rem; gap: 10px; }
    .user-meta { display: flex; gap: 12px; align-items: center; min-width: 0; }
    
    .avatar { 
      width: 44px; height: 44px; border: var(--border); 
      background: #ddd; flex-shrink: 0; overflow: hidden;
    }
    .avatar img { width: 100%; height: 100%; object-fit: cover; }
    
    .user-info { min-width: 0; }
    .user-name { font-weight: 800; text-transform: uppercase; font-size: 0.95rem; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .user-handle { font-family: var(--mono); font-size: 0.7rem; opacity: 0.6; }

    .post-content { font-size: 1rem; margin-bottom: 1.25rem; white-space: pre-wrap; overflow-wrap: break-word; }

    /* ── CODE BLOCKS ── */
    .code-container {
      background: #1a1a1a; border: var(--border); margin: 1rem 0;
      position: relative; transition: all 0.3s ease;
    }
    .code-container.collapsed { max-height: 250px; overflow: hidden; }
    .code-container.collapsed::after {
      content: ""; position: absolute; bottom: 45px; left: 0; right: 0; height: 60px;
      background: linear-gradient(transparent, #1a1a1a); pointer-events: none;
    }
    .code-header { 
      background: #333; padding: 6px 12px; display: flex; justify-content: space-between; 
      align-items: center; border-bottom: 1px solid #444;
    }
    .code-lang { color: #aaa; font-family: var(--mono); font-size: 0.65rem; text-transform: uppercase; }
    
    .code-body { 
      padding: 1rem; color: var(--success); font-family: var(--mono); 
      font-size: 0.8rem; overflow-x: auto; tab-size: 2;
    }
    
    .code-actions { display: flex; flex-wrap: wrap; gap: 8px; padding: 8px; background: #222; border-top: 1px solid #333; }
    
    .btn-sm { 
      padding: 4px 10px; font-family: var(--mono); font-size: 0.65rem; 
      cursor: pointer; border: 1px solid #555; background: #333; color: white;
      display: flex; align-items: center; gap: 5px;
    }
    .btn-sm:hover { background: #444; border-color: #999; }

    /* ── LIVE PREVIEW ── */
    .preview-box {
      margin: 1rem 0; border: var(--border); background: white; height: 350px; width: 100%;
      display: none; flex-direction: column;
    }
    .preview-box.active { display: flex; }
    .preview-toolbar { background: #f0f0f0; border-bottom: 1px solid #ddd; padding: 5px 10px; display: flex; justify-content: flex-end; }
    .preview-iframe { flex: 1; width: 100%; border: none; }

    .post-footer { 
      display: flex; justify-content: space-between; align-items: center; 
      border-top: 1px solid #eee; margin-top: 1rem; padding-top: 1rem;
    }
    .post-stats { display: flex; gap: 1rem; font-family: var(--mono); font-size: 0.75rem; }
    .stat { display: flex; align-items: center; gap: 4px; }

    @media (max-width: 800px) {
      .app-grid { grid-template-columns: 1fr; }
      .sidebar { display: none; }
      .search-container { display: none; }
    }

    .icon { width: 1.2em; height: 1.2em; stroke: currentColor; stroke-width: 2; fill: none; stroke-linecap: round; stroke-linejoin: round; flex-shrink: 0; }
  </style>
</head>
<body>

<header>
  <div class="brand">
    <svg class="icon" viewBox="0 0 24 24"><path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"/></svg>
    Terminal
  </div>

  <div class="search-container">
    <svg class="icon search-icon" viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
    <input type="text" class="search-input" placeholder="Search posts or code..." id="post-search">
  </div>

  <div class="nav-actions">
    <button class="btn" id="refresh-btn">
      <svg class="icon" viewBox="0 0 24 24"><path d="M23 4v6h-6M1 20v-6h6M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"/></svg>
      Sync
    </button>
  </div>
</header>

<main class="app-grid">
  <aside class="sidebar">
    <div class="card">
      <div class="sidebar-title">
        <svg class="icon" viewBox="0 0 24 24"><polygon points="22 3 2 3 10 12.46 10 19 14 21 14 12.46 22 3"/></svg>
        Filters
      </div>
      <div class="filter-group">
        <div class="filter-item active" data-type="all">
          <svg class="icon" viewBox="0 0 24 24"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"/><line x1="3" y1="9" x2="21" y2="9"/><line x1="9" y1="21" x2="9" y2="9"/></svg>
          All Streams
        </div>
        <div class="filter-item" data-type="code">
          <svg class="icon" viewBox="0 0 24 24"><polyline points="16 18 22 12 16 6"/><polyline points="8 6 2 12 8 18"/></svg>
          Code Snippets
        </div>
        <div class="filter-item" data-type="media">
          <svg class="icon" viewBox="0 0 24 24"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>
          Media Assets
        </div>
      </div>
    </div>

    <div class="card">
      <div class="sidebar-title">
        <svg class="icon" viewBox="0 0 24 24"><path d="M12 2v20M2 12h20M4.93 4.93l14.14 14.14M4.93 19.07L19.07 4.93"/></svg>
        Today's Stats
      </div>
      <div class="stat-row"><span>New Posts</span> <span class="stat-val" id="stat-posts">0</span></div>
      <div class="stat-row"><span>Code Lines</span> <span class="stat-val" id="stat-lines">0</span></div>
      <div class="stat-row"><span>Interaction</span> <span class="stat-val" id="stat-likes">0</span></div>
      <button class="btn" style="width: 100%; margin-top: 10px; font-size: 0.7rem;" onclick="fetchFeed()">
        <svg class="icon" viewBox="0 0 24 24"><path d="M21 12a9 9 0 1 1-9-9c2.52 0 4.85.83 6.72 2.25L21 8M21 3v5h-5"/></svg>
        Refresh Stats
      </button>
    </div>
  </aside>

  <section id="feed-container">
    <div id="feed">
      <!-- Posts injected here -->
    </div>
  </section>
</main>

<script>
  const API = 'https://genjutsu-social.vercel.app/api/genjutsu-feed';
  const SOURCE = 'https://genjutsu-social.vercel.app';
  let allPosts = [];
  let currentFilter = 'all';
  let searchQuery = '';

  const ICONS = {
    heart: `<svg class="icon" viewBox="0 0 24 24"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg>`,
    comment: `<svg class="icon" viewBox="0 0 24 24"><path d="M21 11.5a8.38 8.38 0 0 1-.9 3.8 8.5 8.5 0 0 1-7.6 4.7 8.38 8.38 0 0 1-3.8-.9L3 21l1.9-5.7a8.38 8.38 0 0 1-.9-3.8 8.5 8.5 0 0 1 4.7-7.6 8.38 8.38 0 0 1 3.8-.9h.5a8.48 8.48 0 0 1 8 8v.5z"/></svg>`,
    eye: `<svg class="icon" viewBox="0 0 24 24"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>`,
    external: `<svg class="icon" viewBox="0 0 24 24"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></svg>`,
    play: `<svg class="icon" viewBox="0 0 24 24"><polygon points="5 3 19 12 5 21 5 3"/></svg>`,
    chevronDown: `<svg class="icon" viewBox="0 0 24 24"><polyline points="6 9 12 15 18 9"/></svg>`,
    chevronUp: `<svg class="icon" viewBox="0 0 24 24"><polyline points="18 15 12 9 6 15"/></svg>`,
    maximize: `<svg class="icon" viewBox="0 0 24 24"><path d="M15 3h6v6M9 21H3v-6M21 3l-7 7M3 21l7-7"/></svg>`
  };

  async function fetchFeed() {
    try {
      const res = await fetch(API, { cache: 'no-store' });
      const data = await res.json();
      if (data.ok) {
        allPosts = data.posts;
        calculateStats();
        render();
      }
    } catch (e) {
      console.error("Fetch error", e);
    }
  }

  function calculateStats() {
    const today = new Date().toDateString();
    const todayPosts = allPosts.filter(p => new Date(p.created_at).toDateString() === today);
    document.getElementById('stat-posts').innerText = todayPosts.length;
    
    let totalLines = 0;
    let totalLikes = 0;
    allPosts.forEach(p => {
      if (p.code) totalLines += p.code.split('\n').length;
      totalLikes += (p.likes_count || 0);
    });
    document.getElementById('stat-lines').innerText = totalLines;
    document.getElementById('stat-likes').innerText = totalLikes;
  }

  function toggleCode(btn) {
    const container = btn.closest('.code-container');
    const isCollapsed = container.classList.toggle('collapsed');
    btn.innerHTML = isCollapsed ? `${ICONS.chevronDown} View All` : `${ICONS.chevronUp} Collapse`;
  }

  function runCode(btn, code, lang) {
    const post = btn.closest('.post');
    let previewBox = post.querySelector('.preview-box');
    
    if (!previewBox) {
      previewBox = document.createElement('div');
      previewBox.className = 'preview-box';
      previewBox.innerHTML = `
        <div class="preview-toolbar">
          <button class="btn-sm" style="background:transparent; color:#333; border-color:#ccc;" onclick="openInNewWindow(\`${code.replace(/`/g, '\\`').replace(/\$/g, '\\$')}\`, '${lang}')">
            ${ICONS.maximize} Open in New Window
          </button>
        </div>
        <iframe class="preview-iframe"></iframe>
      `;
      post.querySelector('.code-container').after(previewBox);
    }

    const isActive = previewBox.classList.toggle('active');
    btn.innerHTML = isActive ? `✕ Stop Preview` : `${ICONS.play} Live Preview`;

    if (isActive) {
      const iframe = previewBox.querySelector('iframe');
      let doc = iframe.contentWindow.document;
      doc.open();
      if (lang === 'html' || !lang) {
        doc.write(code);
      } else if (lang === 'javascript' || lang === 'js') {
        doc.write(`<html><body style="font-family:sans-serif;"><h3>JS Output:</h3><div id="output"></div><script>
          const console = { log: (msg) => { document.getElementById('output').innerHTML += '<div>' + msg + '</div>'; } };
          ${code}
        <\/script></body></html>`);
      } else if (lang === 'css') {
        doc.write(`<html><head><style>${code}</style></head><body><h3>CSS Applied</h3><p>Testing style rendering...</p><div class="test">Styled Block</div></body></html>`);
      }
      doc.close();
    }
  }

  function openInNewWindow(code, lang) {
    const win = window.open("", "_blank");
    if (lang === 'html' || !lang) {
      win.document.write(code);
    } else {
      win.document.write(`<html><body><pre>${code}</pre></body></html>`);
    }
    win.document.close();
  }

  function render() {
    const container = document.getElementById('feed');
    const filtered = allPosts.filter(p => {
      // Type Filter
      let passType = true;
      if (currentFilter === 'code') passType = !!p.code;
      if (currentFilter === 'media') passType = !!p.media_url;
      
      // Search Filter
      const contentMatch = (p.content || '').toLowerCase().includes(searchQuery.toLowerCase());
      const codeMatch = (p.code || '').toLowerCase().includes(searchQuery.toLowerCase());
      const userMatch = (p.profile?.username || '').toLowerCase().includes(searchQuery.toLowerCase());
      
      return passType && (contentMatch || codeMatch || userMatch);
    });

    if (filtered.length === 0) {
      container.innerHTML = `<div class="post" style="text-align:center; opacity:0.6;">No matching records found in database.</div>`;
      return;
    }

    container.innerHTML = filtered.map(p => {
      const name = p.profile?.display_name || p.profile?.username || 'ANON';
      const handle = p.profile?.username || 'ghost';
      const avatarUrl = p.profile?.avatar_url || `https://api.dicebear.com/7.x/identicon/svg?seed=${handle}`;
      
      let codeHtml = '';
      if (p.code) {
        const isPreviewable = ['html', 'css', 'javascript', 'js'].includes(p.code_language?.toLowerCase());
        codeHtml = `
          <div class="code-container collapsed">
            <div class="code-header">
              <div class="code-lang">${p.code_language || 'text'}</div>
            </div>
            <pre class="code-body"><code>${p.code}</code></pre>
            <div class="code-actions">
              <button class="btn-sm" onclick="toggleCode(this)">${ICONS.chevronDown} View All</button>
              ${isPreviewable ? `<button class="btn-sm" onclick="runCode(this, \`${p.code.replace(/`/g, '\\`').replace(/\$/g, '\\$')}\`, '${p.code_language}')">${ICONS.play} Live Preview</button>` : ''}
            </div>
          </div>
        `;
      }

      const mediaHtml = p.media_url ? `<div style="margin: 1rem 0; border: var(--border); overflow: hidden;"><img src="${p.media_url}" style="width: 100%; display: block;"></div>` : '';

      return `
        <article class="post">
          <div class="post-header">
            <div class="user-meta">
              <div class="avatar"><img src="${avatarUrl}" alt="avatar" onerror="this.src='https://api.dicebear.com/7.x/identicon/svg?seed=fallback'"></div>
              <div class="user-info">
                <div class="user-name">${name}</div>
                <div class="user-handle">@${handle}</div>
              </div>
            </div>
            <div style="font-family: var(--mono); font-size: 0.65rem; opacity: 0.5;">
              ${new Date(p.created_at).toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'})}
            </div>
          </div>

          <div class="post-content">${p.content || ''}</div>
          ${codeHtml}
          ${mediaHtml}

          <div class="post-footer">
            <div class="post-stats">
              <span class="stat">${ICONS.heart} ${p.likes_count || 0}</span>
              <span class="stat">${ICONS.comment} ${p.comments_count || 0}</span>
              <span class="stat">${ICONS.eye} ${p.views_count || 0}</span>
            </div>
            <a href="${SOURCE}/post/${p.id}" target="_blank" class="btn btn-sm">
              ${ICONS.external} Source
            </a>
          </div>
        </article>
      `;
    }).join('');
  }

  // Search Logic
  document.getElementById('post-search').addEventListener('input', (e) => {
    searchQuery = e.target.value;
    render();
  });

  // Filters logic
  document.querySelectorAll('.filter-item').forEach(item => {
    item.addEventListener('click', () => {
      document.querySelectorAll('.filter-item').forEach(i => i.classList.remove('active'));
      item.classList.add('active');
      currentFilter = item.dataset.type;
      render();
    });
  });

  document.getElementById('refresh-btn').onclick = fetchFeed;

  // Init
  fetchFeed();
  setInterval(fetchFeed, 60000);
</script>

</body>
</html>
